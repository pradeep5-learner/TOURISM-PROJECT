<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>My Wishlist</title>

<style>
* {
  box-sizing: border-box;
  font-family: Segoe UI;
}

body {
  background: #f4f4f4;
}

header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
}

.card img {
  width: 100%;
  height: 170px;
  object-fit: cover;
}

.card .info {
  padding: 15px;
}

.card button {
  margin-top: 8px;
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: 20px;
  background: red;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>❤️ My Wishlist</h1>

  <button onclick="planTrip()" style="
    margin-top:10px;
    padding:8px 16px;
    border-radius:20px;
    border:none;
    background:#ff9933;
    font-weight:bold;
    cursor:pointer;
  ">
    ✈️ Plan Trip
  </button>
</header>

<!-- TRIP RESULT -->
<div id="tripResult" style="
  max-width:1200px;
  margin:10px auto;
  padding:15px;
  background:#fff3e0;
  border-radius:10px;
  display:none;
  position:relative;
">

  <button onclick="document.getElementById('tripResult').style.display='none'"
    style="position:absolute;top:10px;right:10px;background:red;color:white;border:none;border-radius:50%;width:30px;height:30px;">
    ❌
  </button>

  <h3>✈️ Your Trip Plan</h3>
  <p id="tripText"></p>
  <button id="mapBtn">🌍 View in Google Maps</button>

</div>

<div class="container" id="wishlistContainer"></div>

<!-- ✅ IMPORTANT MODULE SCRIPT -->
<script type="module">
import { auth, onAuthStateChanged } from "./auth.js";

let userEmail = "";

// 🔐 WAIT FOR LOGIN
onAuthStateChanged(auth, user => {
  if (!user) {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  userEmail = user.email;
  loadWishlist();
});

// LOAD WISHLIST
async function loadWishlist() {
  const res = await fetch(`https://tourism-project-3yli.onrender.com/api/wishlist/${userEmail}`);
  const places = await res.json();

  const container = document.getElementById("wishlistContainer");
  container.innerHTML = "";

  places.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/300x170?text=No+Image'">
        <div class="info">
          <h3>${p.name}</h3>
          <p>📍 ${p.district}, ${p.state}</p>
          <p>🏷 ${p.category}</p>

          <label>
            <input type="checkbox" value="${p._id}" class="tripSelect">
            Select for Trip
          </label>

          <button onclick="openPlace('${p._id}')">📍 View Details</button>
          <button onclick="removeFromWishlist('${p._id}')">❌ Remove</button>
        </div>
      </div>
    `;
  });
}

// REMOVE
window.removeFromWishlist = async function(id) {
  await fetch(`https://tourism-project-3yli.onrender.com/api/wishlist/${userEmail}/${id}`, {
  method: "DELETE"
});

  loadWishlist();
};

// OPEN DETAILS
window.openPlace = function(id) {
  window.location.href = `place.html?id=${id}`;
};

// DISTANCE
function distance(a, b) {
  return Math.sqrt(Math.pow(a.lat - b.lat, 2) + Math.pow(a.lng - b.lng, 2));
}

// PLAN TRIP
window.planTrip = function() {
  const selectedIds = [...document.querySelectorAll(".tripSelect:checked")]
    .map(cb => cb.value);

  if (selectedIds.length < 2) {
    alert("Select at least 2 places");
    return;
  }

  fetch(`https://tourism-project-3yli.onrender.com/api/wishlist/${userEmail}`)
    .then(res => res.json())
    .then(placesData => {

      const selectedPlaces = placesData.filter(p =>
        selectedIds.includes(p._id)
      );

      let ordered = [];
      let remaining = [...selectedPlaces];
      let current = remaining.shift();
      ordered.push(current);

      while (remaining.length > 0) {
        let nearest = remaining[0];
        let minDist = distance(current, nearest);
        let nearestIndex = 0;

        for (let i = 0; i < remaining.length; i++) {
          let d = distance(current, remaining[i]);
          if (d < minDist) {
            minDist = d;
            nearest = remaining[i];
            nearestIndex = i;
          }
        }

        ordered.push(nearest);
        current = nearest;
        remaining.splice(nearestIndex, 1);
      }

      const routeNames = ordered.map(p => p.name);

      document.getElementById("tripText").innerText =
        routeNames.join(" → ");

      const origin = encodeURIComponent(routeNames[0]);
      const destination = encodeURIComponent(routeNames[routeNames.length - 1]);
      const waypoints = routeNames
        .slice(1, -1)
        .map(name => encodeURIComponent(name))
        .join('|');

      const mapUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&waypoints=${waypoints}&travelmode=driving`;

      document.getElementById("mapBtn").onclick = () =>
        window.open(mapUrl, '_blank');

      document.getElementById("tripResult").style.display = "block";
    });
};
</script>

</body>
</html>
